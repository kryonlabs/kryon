name: Kryon Comprehensive Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
        components: rustfmt, clippy
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check code formatting
      run: cargo fmt --all -- --check
      
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Build test infrastructure
      run: cargo build --package kryon-tests --bins
    
    - name: Run unit tests
      run: |
        cd tests
        ./run_tests.sh --unit --verbose
    
    - name: Upload test reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: unit-test-reports
        path: tests/reports/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libgtk-3-dev
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build all renderers
      run: |
        cargo build --package kryon-compiler
        cargo build --package kryon-ratatui
        # Disable GUI renderers in CI
        # cargo build --package kryon-raylib
        # cargo build --package kryon-wgpu
    
    - name: Run integration tests
      run: |
        cd tests
        ./run_tests.sh --integration --verbose
        
    - name: Upload test reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-reports
        path: tests/reports/

  visual-tests:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run visual regression tests
      run: |
        cd tests
        ./run_tests.sh --visual --verbose
        
    - name: Upload snapshots
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: visual-test-snapshots
        path: tests/reports/snapshots/

  performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Run performance benchmarks
      run: |
        cd tests
        ./run_tests.sh --performance --verbose
        
    - name: Upload benchmark reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-benchmarks
        path: tests/reports/benchmarks/

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: nightly
        override: true
        components: llvm-tools-preview
    
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-nightly-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Generate coverage report
      run: |
        cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: lcov.info
        fail_ci_if_error: true
        
    - name: Check coverage threshold
      run: |
        cd tests
        cargo run --bin test_runner -- --type all --output json > results.json
        # Add coverage threshold checking logic here

  end-to-end:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build complete project
      run: cargo build --release --all-targets
    
    - name: Run end-to-end tests
      run: |
        cd tests
        ./run_tests.sh --e2e --verbose
        
    - name: Upload e2e reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: e2e-test-reports
        path: tests/reports/

  comprehensive-report:
    name: Generate Comprehensive Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, visual-tests, performance-tests, end-to-end]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all test artifacts
      uses: actions/download-artifact@v3
      with:
        path: test-results
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Generate comprehensive report
      run: |
        cd tests
        ./run_tests.sh --all --no-cleanup --generate-report
        
    - name: Upload comprehensive report
      uses: actions/upload-artifact@v3
      with:
        name: comprehensive-test-report
        path: tests/reports/
        
    - name: Post status to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          try {
            const report = JSON.parse(fs.readFileSync('tests/reports/test_report.json', 'utf8'));
            const body = `## 🧪 Test Results Summary
            
            **Total Tests:** ${report.total_tests}
            **Passed:** ${report.passed} ✅
            **Failed:** ${report.failed} ❌
            **Success Rate:** ${(report.passed / report.total_tests * 100).toFixed(1)}%
            **Duration:** ${report.total_time_seconds.toFixed(2)}s
            
            ### Breakdown
            - **Unit Tests:** ${report.breakdown.unit_tests.passed}/${report.breakdown.unit_tests.total}
            - **Integration Tests:** ${report.breakdown.integration_tests.passed}/${report.breakdown.integration_tests.total}
            - **Visual Tests:** ${report.breakdown.visual_tests.passed}/${report.breakdown.visual_tests.total}
            - **Performance Tests:** ${report.breakdown.performance_tests.passed}/${report.breakdown.performance_tests.total}
            
            ${report.success ? '🎉 All tests passed!' : '⚠️ Some tests failed - please check the logs.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          } catch (error) {
            console.log('Could not post test summary:', error.message);
          }